{{ include parts_html_header.html }}

<main class="n3s-mypage-page n3s-upload-page">
  <nav class="n3s-mypage-nav" aria-label="マイページメニュー">
    <a href="{{ $link_mypage }}">私の作品</a>
    <a href="{{ $link_material }}">私の素材</a>
    <a href="{{ $link_all_fav }}">お気に入り</a>
    <a href="{{ $link_userinfo }}">プロフィール設定</a>
  </nav>

  <header class="n3s-upload-header">
    <div>
      <p class="n3s-upload-eyebrow">MATERIALS</p>
      <h1>素材をアップロード</h1>
    </div>
    <a class="pure-button" href="index.php?action=upload&amp;mode=list">素材一覧を見る</a>
  </header>

  <section class="n3s-mypage-section n3s-upload-section">
    <form enctype="multipart/form-data" action="{{$baseurl}}/index.php?action=upload&amp;mode=go" method="POST" class="pure-form pure-form-stacked n3s-upload-form" onsubmit="return checkForm();">
      <input type="hidden" name="MAX_FILE_SIZE" value="{{ $max_file_size }}">
      <input type="hidden" name="edit_token" value="{{$edit_token}}">

      <div class="n3s-upload-field">
        <label for="userfile">ファイル</label>
        <input id="userfile" name="userfile" type="file" required>
        <p>最大{{$max_file_size_mb}}MB。画像、音声、テキストなどに対応しています。</p>
      </div>

      <div class="n3s-upload-field">
        <label for="title">タイトル</label>
        <input id="title" type="text" name="title">
      </div>

      <div class="n3s-upload-field">
        <label for="description">説明（任意）</label>
        <textarea id="description" name="description" rows="4"></textarea>
        <p>素材の内容や使い方などの説明を書けます。空欄でも投稿できます。</p>
      </div>

      <fieldset class="n3s-upload-terms">
        <legend>規約同意</legend>
        <label class="n3s-upload-check"><input type="checkbox" name="copyright" id="copyright" value="ok"> このファイルは著作権上問題がなく、<a href="index.php?action=kiyaku" target="new">利用規約</a>に同意します。</label>
      </fieldset>

      <fieldset class="n3s-upload-license">
        <legend>ライセンス選択</legend>
        <div class="n3s-upload-radio-list">
          <label><input type="radio" name="copyright_type" value="CC0" checked> パブリックドメイン (CC0)</label>
          <label><input type="radio" name="copyright_type" value="CC-BY"> CC BY (著作権表示が必要)</label>
          <label><input type="radio" name="copyright_type" value="SELF"> 自分専用</label>
        </div>
      </fieldset>

      <details class="n3s-upload-optional">
        <summary>アプリ内で使う場合</summary>
        <div class="n3s-upload-field">
          <label for="app_id">アプリID</label>
          <input id="app_id" type="number" name="app_id" value="0" min="0">
        </div>
        <div class="n3s-upload-field">
          <label for="image_name">ファイル名</label>
          <input id="image_name" type="text" name="image_name" value="">
          <p>英数字、`_`、`-`、`.`のみ。拡張子まで指定します。</p>
        </div>
      </details>

      <div class="n3s-upload-actions">
        <button type="submit" class="pure-button pure-button-primary">ファイルを送信</button>
        <a class="pure-button" href="{{ $link_material }}">私の素材を管理</a>
      </div>
    </form>
  </section>
</main>

<script>
  function checkForm() {
    const maxFileSize = {{ $max_file_size }}
    const userfile = document.getElementById('userfile')
    if (!userfile.files || userfile.files.length === 0) {
      alert('ファイルを指定してください')
      return false
    }
    const file = userfile.files[0]
    if (!file.name.toLowerCase().match(/\.({{ $supported_type }})$/)) {
      alert('アップロードできるファイル形式ではありません。')
      return false
    }
    if (file.size > maxFileSize) {
      alert('ファイルサイズが上限を超えています。')
      return false
    }
    if (!document.getElementById('copyright').checked) {
      alert('著作権と利用規約の同意にチェックを入れてください。')
      return false
    }
    return true
  }
</script>
